name: GoAnime Coverage

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  coverage:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.26.1-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26.1-

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y mpv yt-dlp

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ "User-Agent" = "GoAnime-CI" }
          if ($env:GITHUB_TOKEN) { $headers["Authorization"] = "Bearer $env:GITHUB_TOKEN" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -like "mpv-x86_64-v3-*.7z" } | Select-Object -First 1
          if (-not $asset) { $asset = $release.assets | Where-Object { $_.name -like "mpv-x86_64-*.7z" } | Select-Object -First 1 }
          Write-Host "Downloading $($asset.name)..."
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv.7z -Headers @{ "Accept"="application/octet-stream"; "User-Agent"="GoAnime-CI" }
          7z x mpv.7z -ompv_tmp -y
          $mpvExe = Get-ChildItem -Path mpv_tmp -Recurse -Filter "mpv.exe" | Select-Object -First 1
          echo $mpvExe.DirectoryName | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          & $mpvExe.FullName --version
          # Install yt-dlp directly from GitHub releases (Chocolatey is unreliable)
          $ytRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest" -Headers $headers
          $ytAsset = $ytRelease.assets | Where-Object { $_.name -eq "yt-dlp.exe" } | Select-Object -First 1
          Invoke-WebRequest -Uri $ytAsset.browser_download_url -OutFile "$env:USERPROFILE\yt-dlp.exe"
          echo "$env:USERPROFILE" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          & "$env:USERPROFILE\yt-dlp.exe" --version

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install mpv yt-dlp

      - name: Get dependencies
        run: go mod download

      - name: Run tests with coverage
        shell: bash
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
